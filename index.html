<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy - uLuEulnooronline</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
        }
        .app-name {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }
        h1 {
            color: #333;
            margin-bottom: 40px;
        }
        .language-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-block;
            padding: 15px 40px;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 18px;
            transition: all 0.3s ease;
            min-width: 200px;
        }
        .btn-english {
            background: #007AFF;
            color: white;
        }
        .btn-english:hover {
            background: #0051D5;
            transform: translateY(-2px);
        }
        .btn-arabic {
            background: #34C759;
            color: white;
        }
        .btn-arabic:hover {
            background: #248A3D;
            transform: translateY(-2px);
        }
        @media (max-width: 600px) {
            .container { padding: 40px 20px; margin: 20px; }
            .app-name { font-size: 36px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-name">uLuEulnooronline</div>
        <h1>Privacy Policy</h1>
        <div class="language-buttons">
            <a href="privacy-policy.html" class="btn btn-english">🇬🇧 English</a>
            <a href="privacy-policy-ar.html" class="btn btn-arabic">🇸🇦 العربية</a>
        </div>
    </div>
</body>
</html>
